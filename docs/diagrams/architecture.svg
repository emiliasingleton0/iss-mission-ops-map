<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .bg{fill:#090b0f}.panel{fill:#10151b;stroke:#30383f;stroke-width:2}.title{font-family:Arial, sans-serif;font-weight:700;fill:#f4f1ea;font-size:34px}.label{font-family:Arial, sans-serif;font-weight:700;fill:#d8ded8;font-size:24px}.small{font-family:Arial, sans-serif;fill:#9eaaa5;font-size:18px}.accent{fill:#9bb7aa}.line{stroke:#9bb7aa;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{stroke:#4a5358;stroke-width:2;fill:none}.badge{fill:#151c22;stroke:#9bb7aa;stroke-width:1}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9bb7aa"/></marker>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="60" y="70">ISS Mission Operations Center — Data Architecture</text>
  <text class="small" x="60" y="105">Real telemetry, NASA media, CelesTrak orbital elements, browser geolocation, and client-side SGP4 prediction.</text>

  <rect class="panel" x="540" y="265" width="330" height="150" rx="0"/>
  <text class="label" x="595" y="330">Mission Dashboard</text>
  <text class="small" x="585" y="365">UI • charts • map • pass list</text>

  <rect class="panel" x="70" y="175" width="300" height="120"/>
  <text class="label" x="110" y="225">wheretheiss.at</text>
  <text class="small" x="110" y="260">Live position, altitude, velocity</text>

  <rect class="panel" x="70" y="450" width="300" height="120"/>
  <text class="label" x="110" y="500">CelesTrak TLE</text>
  <text class="small" x="110" y="535">Current ISS orbital elements</text>

  <rect class="panel" x="540" y="545" width="330" height="120"/>
  <text class="label" x="610" y="595">SGP4 Engine</text>
  <text class="small" x="588" y="630">Client-side orbit propagation</text>

  <rect class="panel" x="1030" y="175" width="300" height="120"/>
  <text class="label" x="1070" y="225">NASA APOD API</text>
  <text class="small" x="1070" y="260">Official daily NASA media</text>

  <rect class="panel" x="1030" y="450" width="300" height="120"/>
  <text class="label" x="1070" y="500">Browser APIs</text>
  <text class="small" x="1070" y="535">Geolocation and notifications</text>

  <path class="line" d="M370 235 C440 235 470 320 540 320"/>
  <path class="line" d="M1030 235 C960 235 940 320 870 320"/>
  <path class="line" d="M370 510 C450 510 460 605 540 605"/>
  <path class="line" d="M705 545 L705 420"/>
  <path class="line" d="M1030 510 C960 510 940 360 870 360"/>
  <path class="line" d="M870 605 C965 605 982 510 1030 510"/>

  <rect class="badge" x="590" y="170" width="230" height="50"/>
  <text class="small" x="625" y="202">Source Transparency</text>
  <path class="muted" d="M705 220 L705 265"/>

  <text class="small" x="70" y="690">Portfolio focus: multi-source API integration, orbital prediction, geolocation, live visualization, diagnostics, and clear data provenance.</text>
</svg>
